<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheda Personaggio D&D 5e con IA</title>
    
    <!-- Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <!-- React and ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PDF Generation Libraries from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Lora', serif;
        }
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #character-sheet-printable > div { display: block !important; }
            .print-container { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 1rem !important; }
            .print-col-span-2 { grid-column: span 2 / span 2; }
            .print\:hidden { display: none !important; }
        }
    </style>
</head>
<body class="bg-stone-100">
    <div id="root"></div>
    <footer class="text-center text-xs text-stone-400 py-4 print:hidden">
        <p>Scheda Personaggio D&D 5e creata con Gemini</p>
    </footer>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- Helper Functions & Constants ---
        const getModifier = (score) => Math.floor((score - 10) / 2);

        const createNewCharacter = () => ({
          id: crypto.randomUUID(),
          name: "Nuovo Eroe", classLevel: "Guerriero 1", race: "Umano", background: "Accolito", alignment: "Legale Buono",
          playerName: "", experience: 0,
          abilityScores: { strength: 10, dexterity: 10, constitution: 10, intelligence: 10, wisdom: 10, charisma: 10 },
          inspiration: 0, proficiencyBonus: 2,
          savingThrows: { strength: { proficient: false }, dexterity: { proficient: false }, constitution: { proficient: false }, intelligence: { proficient: false }, wisdom: { proficient: false }, charisma: { proficient: false } },
          skills: { acrobatics: { proficient: false }, animalHandling: { proficient: false }, arcana: { proficient: false }, athletics: { proficient: false }, deception: { proficient: false }, history: { proficient: false }, insight: { proficient: false }, intimidation: { proficient: false }, investigation: { proficient: false }, medicine: { proficient: false }, nature: { proficient: false }, perception: { proficient:false }, performance: { proficient: false }, persuasion: { proficient: false }, religion: { proficient: false }, sleightOfHand: { proficient: false }, stealth: { proficient: false }, survival: { proficient: false } },
          armorClass: 10, initiative: 0, speed: "9m", maxHp: 10, currentHp: 10, tempHp: 0,
          hitDice: { total: "1d10", remaining: 1 },
          deathSaves: { successes: 0, failures: 0 },
          attacks: [{ name: "Spada Lunga", bonus: "+3", damage: "1d8+1 tagliente" }],
          equipment: "Zaino, sacco a pelo, 10 torce...",
          currency: { cp: 0, sp: 0, ep: 0, gp: 15, pp: 0 },
          personalityTraits: "", ideals: "", bonds: "", flaws: "",
          features: "Stile di Combattimento, Secondo Vento",
          proficienciesAndLanguages: "Armature leggere, medie, pesanti, scudi, armi semplici, da guerra. Comune, Elfico.",
          appearance: "", imageUrl: "", adventureHook: "",
          spellcasting: {
              ability: 'intelligence',
              cantrips: [],
              levels: Array(9).fill(null).map(() => ({
                  slotsTotal: 0,
                  slotsExpended: 0,
                  spells: []
              }))
          }
        });

        const SKILL_NAMES = {
            acrobatics: { name: "Acrobazia", ability: "dexterity" }, animalHandling: { name: "Addestrare Animali", ability: "wisdom" },
            arcana: { name: "Arcano", ability: "intelligence" }, athletics: { name: "Atletica", ability: "strength" },
            deception: { name: "Inganno", ability: "charisma" }, history: { name: "Storia", ability: "intelligence" },
            insight: { name: "Intuizione", ability: "wisdom" }, intimidation: { name: "Intimidire", ability: "charisma" },
            investigation: { name: "Investigare", ability: "intelligence" }, medicine: { name: "Medicina", ability: "wisdom" },
            nature: { name: "Natura", ability: "intelligence" }, perception: { name: "Percezione", ability: "wisdom" },
            performance: { name: "Intrattenere", ability: "charisma" }, persuasion: { name: "Persuasione", ability: "charisma" },
            religion: { name: "Religione", ability: "intelligence" }, sleightOfHand: { name: "Rapidità di Mano", ability: "dexterity" },
            stealth: { name: "Furtività", ability: "dexterity" }, survival: { name: "Sopravvivenza", ability: "wisdom" },
        };

        const SAVING_THROW_NAMES = {
            strength: "Forza", dexterity: "Destrezza", constitution: "Costituzione",
            intelligence: "Intelligenza", wisdom: "Saggezza", charisma: "Carisma",
        };

        // --- UI Components ---
        const ParchmentButton = ({ children, onClick, className = '', disabled = false }) => (
            <button onClick={onClick} disabled={disabled} className={`px-4 py-2 bg-stone-200 hover:bg-stone-300 border border-stone-400 rounded-md text-stone-800 font-semibold shadow-sm transition-all duration-200 ease-in-out transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed print:hidden ${className}`}>
                {children}
            </button>
        );
        
        const Section = ({ title, children, className = '', actions }) => (
            <div className={`bg-white/40 border-2 border-stone-400/50 rounded-lg p-4 shadow-inner backdrop-blur-sm print:shadow-none print:border-stone-600 print:bg-white ${className}`}>
                <div className="flex justify-between items-center mb-3 border-b-2 border-red-900/30 pb-1 print:border-b-2 print:border-stone-800">
                    <h2 className="text-xl font-bold text-red-900/80 font-serif print:text-black">{title}</h2>
                    {actions && <div className="flex-shrink-0 print:hidden">{actions}</div>}
                </div>
                {children}
            </div>
        );
        
        const GeminiButton = ({ onClick, isLoading, children, className = '' }) => (
            <button onClick={onClick} disabled={isLoading} className={`px-3 py-1 text-sm bg-gradient-to-r from-purple-500 to-red-500 text-white rounded-full shadow-md hover:shadow-lg transform hover:scale-105 transition-all disabled:opacity-70 disabled:cursor-wait print:hidden ${className}`}>
                <span className="flex items-center space-x-2">
                    {isLoading ? ( <svg className="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"> <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle> <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path> </svg> ) : ( <span>✨</span> )}
                    <span>{children}</span>
                </span>
            </button>
        );

        const TabButton = ({ name, activeTab, onClick, children }) => {
            const isActive = name === activeTab;
            return (
                <button onClick={() => onClick(name)} className={`px-4 md:px-6 py-2 font-serif text-base md:text-lg transition-colors focus:outline-none whitespace-nowrap ${ isActive ? 'border-b-4 border-red-800 text-red-900' : 'text-stone-500 hover:text-red-800' }`}>
                    {children}
                </button>
            );
        };

        const StatBox = ({ label, value, className = "" }) => (
            <div className={`flex flex-col items-center justify-center p-2 bg-stone-50/70 border-2 border-stone-400 rounded-lg shadow-md ${className}`}>
                <div className="text-2xl font-bold text-stone-800">{value}</div>
                <label className="text-xs font-bold text-stone-700 text-center">{label}</label>
            </div>
        );

        const DeathSaveTracker = ({ successes, failures, onUpdate }) => {
            const handleToggle = (type, index) => {
                const currentCount = type === 'successes' ? successes : failures;
                onUpdate(type, currentCount === index + 1 ? currentCount - 1 : index + 1);
            };
        
            return (
                <div className="flex justify-between items-center mt-2">
                    <div className="flex items-center space-x-2">
                        <span className="font-bold text-sm">Successi</span>
                        {[...Array(3)].map((_, i) => (
                            <input key={`s-${i}`} type="checkbox" checked={i < successes} onChange={() => handleToggle('successes', i)} className="form-checkbox h-5 w-5 text-green-600 rounded-full"/>
                        ))}
                    </div>
                    <div className="flex items-center space-x-2">
                        <span className="font-bold text-sm">Fallimenti</span>
                        {[...Array(3)].map((_, i) => (
                            <input key={`f-${i}`} type="checkbox" checked={i < failures} onChange={() => handleToggle('failures', i)} className="form-checkbox h-5 w-5 text-red-600 rounded-full"/>
                        ))}
                    </div>
                </div>
            );
        };
        
        const SpellLevel = ({ level, data, onUpdateCantrips, onUpdateLevel }) => {
            const [newSpell, setNewSpell] = useState('');
            const isCantrip = level === 0;
            const spells = isCantrip ? data.cantrips : data.spells;

            const handleAddSpell = () => {
                if(newSpell.trim() === '') return;
                const spellObject = { name: newSpell, prepared: isCantrip };
                const updatedSpells = [...spells, spellObject];
                if (isCantrip) {
                    onUpdateCantrips(updatedSpells);
                } else {
                    onUpdateLevel('spells', updatedSpells);
                }
                setNewSpell('');
            };

            const handleTogglePrepared = (index) => {
                if(isCantrip) return;
                const updatedSpells = [...spells];
                updatedSpells[index].prepared = !updatedSpells[index].prepared;
                onUpdateLevel('spells', updatedSpells);
            };

            const handleRemoveSpell = (index) => {
                const updatedSpells = spells.filter((_, i) => i !== index);
                if (isCantrip) {
                    onUpdateCantrips(updatedSpells);
                } else {
                    onUpdateLevel('spells', updatedSpells);
                }
            };

            return (
                <Section title={isCantrip ? "Trucchetti" : `Incantesimi di Livello ${level}`}>
                    {!isCantrip && (
                        <div className="flex items-center gap-4 mb-4">
                            <label className="font-bold">Slot</label>
                            <input type="number" min="0" value={data.slotsExpended} onChange={e => onUpdateLevel('slotsExpended', parseInt(e.target.value) || 0)} className="w-16 p-1 text-center border rounded"/>
                            <span>/</span>
                            <input type="number" min="0" value={data.slotsTotal} onChange={e => onUpdateLevel('slotsTotal', parseInt(e.target.value) || 0)} className="w-16 p-1 text-center border rounded"/>
                        </div>
                    )}
                    <ul className="space-y-2">
                        {spells.map((spell, index) => (
                            <li key={index} className="flex items-center gap-2">
                                {!isCantrip && <input type="checkbox" checked={spell.prepared} onChange={() => handleTogglePrepared(index)} className="form-checkbox h-5 w-5 text-red-800 rounded"/>}
                                <span className="flex-grow">{spell.name}</span>
                                <button onClick={() => handleRemoveSpell(index)} className="text-red-500 hover:text-red-800 text-xs">Rimuovi</button>
                            </li>
                        ))}
                    </ul>
                    <div className="flex gap-2 mt-4">
                        <input type="text" value={newSpell} onChange={e => setNewSpell(e.target.value)} placeholder="Nuovo incantesimo" className="flex-grow p-1 border rounded" />
                        <button onClick={handleAddSpell} className="px-3 py-1 bg-red-800 text-white rounded hover:bg-red-900">+</button>
                    </div>
                </Section>
            );
        };

        const TextAreaInput = ({ label, value, onChange, placeholder, className = "", rows = 3, disabled = false }) => (
             <div className={`flex flex-col ${className}`}>
                <label className="text-sm font-bold text-stone-700 mb-1 print:text-black">{label}</label>
                <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} disabled={disabled} className="w-full bg-stone-50/70 border border-stone-300 rounded-md p-2 text-stone-800 focus:outline-none focus:ring-2 focus:ring-red-800/50 resize-y disabled:opacity-70 print:border-stone-500 print:bg-white print:text-black" />
            </div>
        );

        const AbilityScoreInput = ({ label, score, onScoreChange }) => {
            const modifier = getModifier(score);
            return (
                <div className="flex flex-col items-center justify-between p-2 bg-stone-50/70 border-2 border-stone-400 rounded-lg shadow-md h-32 print:border-2 print:border-stone-600 print:shadow-none">
                    <label className="text-xs font-bold text-stone-700 print:text-black">{label.toUpperCase()}</label>
                    <input type="number" value={score} onChange={e => onScoreChange(parseInt(e.target.value) || 0)} className="w-full text-4xl text-center bg-transparent text-stone-800 font-serif focus:outline-none print:text-black" />
                    <div className="w-12 h-12 flex-shrink-0 flex items-center justify-center border-2 border-stone-300 rounded-full bg-white text-lg font-bold text-stone-800 print:border-stone-500 print:text-black">
                        {modifier >= 0 ? `+${modifier}` : modifier}
                    </div>
                </div>
            );
        };

        // --- Main Components ---
        const CharacterSheet = ({ character, onUpdate, onBack }) => {
            const [sheetData, setSheetData] = useState(character);
            const [activeTab, setActiveTab] = useState('principale');
            const [isGenerating, setIsGenerating] = useState({ appearance: false, background: false, portrait: false, hook: false });
            
            useEffect(() => { onUpdate(sheetData); }, [sheetData, onUpdate]);
            useEffect(() => { setSheetData(character); }, [character]);
            
            const handleChange = (path, value) => {
                setSheetData(prev => {
                    const keys = path.split('.');
                    const newState = JSON.parse(JSON.stringify(prev));
                    let current = newState;
                    for (let i = 0; i < keys.length - 1; i++) {
                        current = current[keys[i]];
                    }
                    current[keys[keys.length - 1]] = value;
                    return newState;
                });
            };
            
            const handleSpellcastingChange = (levelIndex, field, value) => {
                const newLevels = [...sheetData.spellcasting.levels];
                newLevels[levelIndex][field] = value;
                handleChange('spellcasting.levels', newLevels);
            };

            const passivePerception = 10 + getModifier(sheetData.abilityScores.wisdom) + (sheetData.skills.perception.proficient ? sheetData.proficiencyBonus : 0);
            const spellcastingAbilityMod = getModifier(sheetData.abilityScores[sheetData.spellcasting.ability] || 10);
            const calculatedSpellSaveDC = 8 + sheetData.proficiencyBonus + spellcastingAbilityMod;
            const calculatedSpellAttackBonus = sheetData.proficiencyBonus + spellcastingAbilityMod;
            
            const callGeminiAPI = async (prompt, jsonSchema = null) => {
                const apiKey = ""; // Lasciare vuoto
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
                const payload = { contents: [{ parts: [{ text: prompt }] }], ...(jsonSchema && { generationConfig: { responseMimeType: "application/json", responseSchema: jsonSchema } }) };
                try {
                    const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) { const errorBody = await response.text(); throw new Error(`API Error: ${response.status} ${response.statusText}\n${errorBody}`); }
                    const result = await response.json();
                    const text = result?.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) { throw new Error("Risposta API non valida o vuota."); }
                    return text;
                } catch (error) {
                    console.error("Errore chiamata API Gemini:", error);
                    alert(`Si è verificato un errore durante la generazione del testo: ${error.message}`);
                    return null;
                }
            };

            const callImagenAPI = async (prompt) => {
                const apiKey = ""; // Lasciare vuoto
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${apiKey}`;
                const payload = { instances: [{ prompt: prompt }], parameters: { "sampleCount": 1 } };
                try {
                    const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) { const errorBody = await response.text(); throw new Error(`API Error: ${response.status} ${response.statusText}\n${errorBody}`); }
                    const result = await response.json();
                    const base64Data = result?.predictions?.[0]?.bytesBase64Encoded;
                    if (!base64Data) { throw new Error("Risposta API per l'immagine non valida o vuota."); }
                    return `data:image/png;base64,${base64Data}`;
                } catch (error) {
                    console.error("Errore chiamata API Imagen:", error);
                    alert(`Si è verificato un errore durante la generazione dell'immagine: ${error.message}`);
                    return null;
                }
            };
            
            const handleGenerateAppearance = async () => {
                setIsGenerating(prev => ({ ...prev, appearance: true }));
                const prompt = `Sei un Dungeon Master esperto. Descrivi l'aspetto fisico di un personaggio di Dungeons & Dragons in modo vivido e conciso (massimo 2-3 frasi). Personaggio: ${sheetData.name}, un ${sheetData.race} ${sheetData.classLevel}. Evita di descrivere i vestiti, concentrati su volto, capelli, occhi e corporatura.`;
                const generatedText = await callGeminiAPI(prompt);
                if (generatedText) { handleChange('appearance', generatedText); }
                setIsGenerating(prev => ({ ...prev, appearance: false }));
            };

            const handleGenerateBackground = async () => {
                setIsGenerating(prev => ({ ...prev, background: true }));
                const prompt = `Sei un Dungeon Master esperto. Crea un background per un personaggio di Dungeons & Dragons. Personaggio: ${sheetData.name}, un ${sheetData.race} ${sheetData.classLevel} con background di "${sheetData.background}". Genera un tratto di personalità, un ideale, un legame e un difetto basati su queste informazioni.`;
                const schema = { type: "OBJECT", properties: { personalityTraits: { type: "STRING" }, ideals: { type: "STRING" }, bonds: { type: "STRING" }, flaws: { type: "STRING" } }, required: ["personalityTraits", "ideals", "bonds", "flaws"] };
                const generatedJson = await callGeminiAPI(prompt, schema);
                if (generatedJson) {
                    try {
                        const parsedData = JSON.parse(generatedJson);
                        setSheetData(prev => ({ ...prev, ...parsedData }));
                    } catch (e) {
                        console.error("Errore nel parsing del JSON generato:", e);
                        alert("La risposta del generatore di background non era in un formato valido.");
                    }
                }
                setIsGenerating(prev => ({ ...prev, background: false }));
            };

            const handleGeneratePortrait = async () => {
                setIsGenerating(prev => ({ ...prev, portrait: true }));
                const prompt = `Fantasy character portrait, D&D style. ${sheetData.appearance || `A ${sheetData.race} ${sheetData.classLevel}`}. High quality digital painting, detailed face, fantasy art, cinematic lighting.`;
                const imageUrl = await callImagenAPI(prompt);
                if (imageUrl) { handleChange('imageUrl', imageUrl); }
                setIsGenerating(prev => ({ ...prev, portrait: false }));
            };

            const handleGenerateAdventureHook = async () => {
                setIsGenerating(prev => ({ ...prev, hook: true }));
                const prompt = `Sei un Dungeon Master. Crea un breve e intrigante spunto di avventura personalizzato (2-4 frasi) per questo personaggio di D&D:\n- Nome: ${sheetData.name}\n- Classe e Razza: ${sheetData.race} ${sheetData.classLevel}\n- Background: ${sheetData.background}\n- Ideale: ${sheetData.ideals}\n- Legame: ${sheetData.bonds}\n- Difetto: ${sheetData.flaws}\nLo spunto deve dare al giocatore un chiaro punto di partenza per un'avventura.`;
                const generatedText = await callGeminiAPI(prompt);
                if (generatedText) { handleChange('adventureHook', generatedText); }
                setIsGenerating(prev => ({ ...prev, hook: false }));
            };

            const handlePrint = () => {
                const { jsPDF } = window.jspdf;
                const sheetElement = document.getElementById('character-sheet-printable');
                
                window.html2canvas(sheetElement, { scale: 2, useCORS: true, windowWidth: 1440 }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const imgWidth = canvas.width;
                    const imgHeight = canvas.height;
                    const ratio = imgWidth / imgHeight;
                    
                    let newWidth = pdfWidth;
                    let newHeight = newWidth / ratio;

                    if (newHeight > pdfHeight) {
                        newHeight = pdfHeight;
                        newWidth = newHeight * ratio;
                    }
                    
                    const xOffset = (pdfWidth - newWidth) / 2;
                    const yOffset = (pdfHeight - newHeight) / 2;

                    pdf.addImage(imgData, 'PNG', xOffset, yOffset, newWidth, newHeight);
                    pdf.save(`${sheetData.name.replace(/\s/g, '_')}_scheda.pdf`);
                });
            };
            
            const ClickableBonus = ({ children, onClick, title }) => ( <button onClick={onClick} title={title} className="w-8 text-center font-bold cursor-pointer rounded hover:bg-red-200/50 transition-colors"> {children} </button> );

            return (
                <div className="p-2 md:p-8 space-y-4">
                    <div id="character-sheet-printable" className="bg-stone-100 print:bg-white p-2 md:p-4 print:p-0">
                        <header className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4 print:mb-4">
                            <div>
                                <h1 className="text-3xl md:text-4xl font-serif text-red-900 print:text-5xl print:text-black">{sheetData.name}</h1>
                                <p className="text-stone-600 mt-1 print:text-black">{sheetData.classLevel} | {sheetData.race}</p>
                            </div>
                            <div className="flex space-x-2 print:hidden self-start">
                                <ParchmentButton onClick={handlePrint}>PDF</ParchmentButton>
                                <ParchmentButton onClick={onBack}>Lista</ParchmentButton>
                            </div>
                        </header>
                        
                        <div className="border-b-2 border-stone-300/80 my-4 print:hidden">
                            <div className="flex space-x-2 overflow-x-auto">
                                <TabButton name="principale" activeTab={activeTab} onClick={setActiveTab}>Principale</TabButton>
                                <TabButton name="background" activeTab={activeTab} onClick={setActiveTab}>Background & Equip.</TabButton>
                                <TabButton name="incantesimi" activeTab={activeTab} onClick={setActiveTab}>Incantesimi</TabButton>
                            </div>
                        </div>

                        <div className="print-container">
                            {/* Tab 1: Principale */}
                            <div className="print-col-span-2" style={{ display: activeTab === 'principale' ? 'block' : 'none' }}>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-1 space-y-6">
                                        <Section title="Ritratto" actions={<GeminiButton onClick={handleGeneratePortrait} isLoading={isGenerating.portrait}>Genera</GeminiButton>} >
                                            <div className="w-full aspect-square bg-stone-200/50 rounded-lg flex items-center justify-center border-2 border-dashed border-stone-400/50">
                                                {isGenerating.portrait && <div className="text-stone-600">Generazione...</div>}
                                                {!isGenerating.portrait && sheetData.imageUrl && <img src={sheetData.imageUrl} alt={`Ritratto di ${sheetData.name}`} className="w-full h-full object-cover rounded-md"/>}
                                                {!isGenerating.portrait && !sheetData.imageUrl && <div className="text-center text-stone-500 p-4 print:hidden">Genera un ritratto!</div>}
                                            </div>
                                        </Section>
                                        <div className="grid grid-cols-3 gap-2">
                                            <StatBox label="Ispirazione" value={sheetData.inspiration} />
                                            <StatBox label="Bonus Competenza" value={`+${sheetData.proficiencyBonus}`} />
                                            <StatBox label="Percezione Passiva" value={passivePerception} />
                                        </div>
                                        <Section title="Combattimento">
                                            <div className="grid grid-cols-3 gap-4 text-center">
                                                <StatBox label="CA" value={sheetData.armorClass} />
                                                <StatBox label="Iniziativa" value={getModifier(sheetData.abilityScores.dexterity)} />
                                                <StatBox label="Velocità" value={sheetData.speed} />
                                            </div>
                                            <div className="mt-4"><label className="font-bold">Punti Ferita</label><input type="number" value={sheetData.currentHp} onChange={e => handleChange('currentHp', e.target.value)} className="w-full p-2 text-2xl bg-white/80 border-2 border-stone-400 rounded-md font-bold text-center" /></div>
                                            <div className="mt-2"><label className="font-bold">PF Massimi</label><input type="number" value={sheetData.maxHp} onChange={e => handleChange('maxHp', e.target.value)} className="w-full p-1 text-lg bg-stone-50/70 border border-stone-300 rounded-md" /></div>
                                            <div className="mt-2"><label className="font-bold">PF Temporanei</label><input type="number" value={sheetData.tempHp} onChange={e => handleChange('tempHp', e.target.value)} className="w-full p-1 text-lg bg-stone-50/70 border border-stone-300 rounded-md" /></div>
                                            <div className="grid grid-cols-2 gap-4 mt-4">
                                                <div><label className="font-bold">Dadi Vita Totali</label><input type="text" value={sheetData.hitDice.total} onChange={e => handleChange('hitDice.total', e.target.value)} className="w-full p-1 text-center bg-stone-50/70 border rounded"/></div>
                                                <div><label className="font-bold">Dadi Vita Rim.</label><input type="number" value={sheetData.hitDice.remaining} onChange={e => handleChange('hitDice.remaining', e.target.value)} className="w-full p-1 text-center bg-stone-50/70 border rounded"/></div>
                                            </div>
                                            <DeathSaveTracker successes={sheetData.deathSaves.successes} failures={sheetData.deathSaves.failures} onUpdate={(type, value) => handleChange(`deathSaves.${type}`, value)} />
                                        </Section>
                                    </div>
                                    <div className="lg:col-span-1 space-y-6">
                                        <Section title="Caratteristiche">
                                            <div className="grid grid-cols-2 gap-4">
                                                {Object.entries(sheetData.abilityScores).map(([key, value]) => ( <AbilityScoreInput key={key} label={SAVING_THROW_NAMES[key]} score={value} onScoreChange={(score) => handleChange(`abilityScores.${key}`, score)} /> ))}
                                            </div>
                                        </Section>
                                    </div>
                                    <div className="lg:col-span-1 space-y-6">
                                        <Section title="Tiri Salvezza">
                                            <ul className="space-y-2">
                                                {Object.entries(sheetData.savingThrows).map(([key, data]) => {
                                                    const abilityMod = getModifier(sheetData.abilityScores[key]);
                                                    const bonus = abilityMod + (data.proficient ? sheetData.proficiencyBonus : 0);
                                                    return (<li key={key} className="flex items-center space-x-2">
                                                        <input type="checkbox" checked={data.proficient} onChange={() => handleChange(`savingThrows.${key}.proficient`, !data.proficient)} className="form-checkbox h-5 w-5 text-red-800 rounded focus:ring-red-800/50" />
                                                        <ClickableBonus title={`Lancia TS ${SAVING_THROW_NAMES[key]}`}>{bonus >= 0 ? `+${bonus}` : bonus}</ClickableBonus>
                                                        <span className="text-stone-700">{SAVING_THROW_NAMES[key]}</span>
                                                    </li>);
                                                })}
                                            </ul>
                                        </Section>
                                        <Section title="Abilità">
                                            <ul className="space-y-1">
                                                {Object.entries(sheetData.skills).map(([key, data]) => {
                                                    const skillInfo = SKILL_NAMES[key];
                                                    const abilityMod = getModifier(sheetData.abilityScores[skillInfo.ability]);
                                                    const bonus = abilityMod + (data.proficient ? sheetData.proficiencyBonus : 0);
                                                    return (<li key={key} className="flex items-center space-x-2">
                                                        <input type="checkbox" checked={data.proficient} onChange={() => handleChange(`skills.${key}.proficient`, !data.proficient)} className="form-checkbox h-5 w-5 text-red-800 rounded focus:ring-red-800/50"/>
                                                        <ClickableBonus title={`Lancia ${skillInfo.name}`}>{bonus >= 0 ? `+${bonus}` : bonus}</ClickableBonus>
                                                        <span className="text-stone-700 text-sm">{skillInfo.name} <span className="text-xs text-stone-500">({skillInfo.ability.slice(0,3).toUpperCase()})</span></span>
                                                    </li>);
                                                })}
                                            </ul>
                                        </Section>
                                    </div>
                                </div>
                            </div>
                            {/* Tab 2: Background & Equipaggiamento */}
                            <div className="print-col-span-2" style={{ display: activeTab === 'background' ? 'block' : 'none' }}>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="space-y-6">
                                        <Section title="Personalità" actions={<GeminiButton onClick={handleGenerateBackground} isLoading={isGenerating.background}>Genera</GeminiButton>} >
                                            <TextAreaInput label="Aspetto" value={sheetData.appearance} onChange={e => handleChange('appearance', e.target.value)} rows={3} disabled={isGenerating.appearance}/>
                                            <TextAreaInput label="Tratti di Personalità" value={sheetData.personalityTraits} onChange={e => handleChange('personalityTraits', e.target.value)} rows={2} disabled={isGenerating.background} className="mt-2"/>
                                            <TextAreaInput label="Ideali" value={sheetData.ideals} onChange={e => handleChange('ideals', e.target.value)} className="mt-2" rows={2} disabled={isGenerating.background} />
                                            <TextAreaInput label="Legami" value={sheetData.bonds} onChange={e => handleChange('bonds', e.target.value)} className="mt-2" rows={2} disabled={isGenerating.background} />
                                            <TextAreaInput label="Difetti" value={sheetData.flaws} onChange={e => handleChange('flaws', e.target.value)} className="mt-2" rows={2} disabled={isGenerating.background} />
                                        </Section>
                                        <Section title="Spunto di Avventura" actions={<GeminiButton onClick={handleGenerateAdventureHook} isLoading={isGenerating.hook}>Genera</GeminiButton>} >
                                            <TextAreaInput label="" value={sheetData.adventureHook} onChange={e => handleChange('adventureHook', e.target.value)} rows={4} disabled={isGenerating.hook} placeholder="Crea uno spunto di avventura... ✨"/>
                                        </Section>
                                    </div>
                                    <div className="space-y-6">
                                        <Section title="Equipaggiamento & Valuta">
                                            <div className="grid grid-cols-5 gap-2 mb-4">
                                                {Object.keys(sheetData.currency).map(key => (
                                                    <div key={key}><label className="block text-center font-bold text-sm">{key.toUpperCase()}</label><input type="number" value={sheetData.currency[key]} onChange={e => handleChange(`currency.${key}`, e.target.value)} className="w-full p-1 text-center border rounded"/></div>
                                                ))}
                                            </div>
                                            <TextAreaInput label="" value={sheetData.equipment} onChange={e => handleChange('equipment', e.target.value)} rows={10} />
                                        </Section>
                                        <Section title="Privilegi & Tratti">
                                            <TextAreaInput label="" value={sheetData.features} onChange={e => handleChange('features', e.target.value)} rows={10} />
                                        </Section>
                                        <Section title="Altre Competenze & Linguaggi">
                                            <TextAreaInput label="" value={sheetData.proficienciesAndLanguages} onChange={e => handleChange('proficienciesAndLanguages', e.target.value)} rows={6} />
                                        </Section>
                                    </div>
                                </div>
                            </div>
                            {/* Tab 3: Incantesimi */}
                            <div className="print-col-span-2" style={{ display: activeTab === 'incantesimi' ? 'block' : 'none' }}>
                                <Section title="Capacità da Incantatore">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="flex flex-col">
                                            <label className="text-sm font-bold">Caratteristica</label>
                                            <select value={sheetData.spellcasting.ability} onChange={e => handleChange('spellcasting.ability', e.target.value)} className="p-2 border rounded">
                                                <option value="intelligence">Intelligenza</option>
                                                <option value="wisdom">Saggezza</option>
                                                <option value="charisma">Carisma</option>
                                            </select>
                                        </div>
                                        <StatBox label="CD Tiro Salvezza" value={calculatedSpellSaveDC} />
                                        <StatBox label="Bonus Attacco Inc." value={`+${calculatedSpellAttackBonus}`} />
                                    </div>
                                </Section>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4">
                                    <SpellLevel level={0} data={sheetData.spellcasting} onUpdateCantrips={(value) => handleChange('spellcasting.cantrips', value)} />
                                    {sheetData.spellcasting.levels.map((levelData, index) => (
                                        <SpellLevel key={index+1} level={index+1} data={levelData} onUpdateLevel={(field, value) => handleSpellcastingChange(index, field, value)} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        function App() {
            const [characters, setCharacters] = useState([]);
            const [selectedCharacterId, setSelectedCharacterId] = useState(null);

            useEffect(() => {
                const savedCharacters = localStorage.getItem('dnd_characters');
                if (savedCharacters) { setCharacters(JSON.parse(savedCharacters)); }
            }, []);

            useEffect(() => {
                localStorage.setItem('dnd_characters', JSON.stringify(characters));
            }, [characters]);

            const handleCreateCharacter = () => {
                const newChar = createNewCharacter();
                setCharacters(prev => [...prev, newChar]);
                setSelectedCharacterId(newChar.id);
            };
            
            const handleFullGenerateCharacter = async (concept) => {
                const prompt = `Sei un Dungeon Master di D&D 5e di fama mondiale. Genera un personaggio giocabile completo di livello 1 basato su questo concetto: "${concept}". Fornisci i dati in formato JSON. Assegna i punteggi di caratteristica in modo sensato per la classe. Scegli 2 competenze dalla classe e 2 dal background e imposta 'proficient' a 'true' per esse. Fornisci una descrizione fisica, un background dettagliato (tratti, ideali, legami, difetti), uno spunto di avventura, e suggerimenti per equipaggiamento e privilegi. Se è una classe di incantatori, includi 2 trucchetti e 2 incantesimi di 1° livello.`;
                const schema = { type: "OBJECT", properties: {
                    name: { type: "STRING" }, classLevel: { type: "STRING" }, race: { type: "STRING" }, background: { type: "STRING" }, alignment: { type: "STRING" },
                    abilityScores: { type: "OBJECT", properties: { strength: {type: "NUMBER"}, dexterity: {type: "NUMBER"}, constitution: {type: "NUMBER"}, intelligence: {type: "NUMBER"}, wisdom: {type: "NUMBER"}, charisma: {type: "NUMBER"} } },
                    skillsToMakeProficient: { type: "ARRAY", items: { type: "STRING" } },
                    personalityTraits: { type: "STRING" }, ideals: { type: "STRING" }, bonds: { type: "STRING" }, flaws: { type: "STRING" },
                    appearance: { type: "STRING" }, adventureHook: { type: "STRING" }, features: { type: "STRING" }, equipment: { type: "STRING" }, proficienciesAndLanguages: { type: "STRING" },
                    currency: { type: "OBJECT", properties: { gp: {type: "NUMBER"} } },
                    spellcasting: { type: "OBJECT", properties: { cantrips: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, prepared: { type: "BOOLEAN" } } } }, spells_level_1: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, prepared: { type: "BOOLEAN" } } } } } }
                }};

                const apiKey = ""; // Lasciare vuoto
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
                const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json", responseSchema: schema } };

                try {
                    const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Errore nella generazione del personaggio: ${response.status} ${errorText}`);
                    }
                    const result = await response.json();
                    const text = result?.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("Risposta API non valida");
                    
                    const genData = JSON.parse(text);
                    let newChar = createNewCharacter();
                    
                    // Manually merge properties to avoid overwriting nested objects completely
                    Object.keys(genData).forEach(key => {
                        if (key === 'spellcasting') {
                            if (genData.spellcasting) {
                                newChar.spellcasting.cantrips = genData.spellcasting.cantrips || [];
                                if (genData.spellcasting.spells_level_1) {
                                    newChar.spellcasting.levels[0].spells = genData.spellcasting.spells_level_1;
                                }
                            }
                        } else if (key === 'currency') {
                            newChar.currency = { ...newChar.currency, ...genData.currency };
                        } else if (key !== 'skillsToMakeProficient') {
                            newChar[key] = genData[key];
                        }
                    });

                    if (genData.skillsToMakeProficient && Array.isArray(genData.skillsToMakeProficient)) {
                        genData.skillsToMakeProficient.forEach(skillKey => {
                            if (newChar.skills.hasOwnProperty(skillKey)) {
                                newChar.skills[skillKey].proficient = true;
                            }
                        });
                    }

                    const portraitPrompt = `Fantasy character portrait, D&D style. ${genData.appearance || `A ${genData.race} ${genData.classLevel}`}. High quality digital painting, detailed face, fantasy art.`;
                    const imagenApiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${apiKey}`;
                    const imagenPayload = { instances: [{ prompt: portraitPrompt }], parameters: { "sampleCount": 1 } };
                    const imagenResponse = await fetch(imagenApiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(imagenPayload) });
                    if (imagenResponse.ok) {
                        const imagenResult = await imagenResponse.json();
                        const base64Data = imagenResult?.predictions?.[0]?.bytesBase64Encoded;
                        if (base64Data) { newChar.imageUrl = `data:image/png;base64,${base64Data}`; }
                    }

                    setCharacters(prev => [...prev, newChar]);
                    setSelectedCharacterId(newChar.id);

                } catch (error) {
                    console.error("Errore generazione completa:", error);
                    alert(`Si è verificato un errore durante la generazione completa del personaggio: ${error.message}`);
                }
            };

            const handleSelectCharacter = (id) => { setSelectedCharacterId(id); };
            const handleUpdateCharacter = useCallback((updatedCharacter) => {
                setCharacters(prev => prev.map(char => char.id === updatedCharacter.id ? updatedCharacter : char));
            }, []);
            const handleDeleteCharacter = (id) => {
                if(window.confirm("Sei sicuro di voler eliminare questo personaggio? L'azione è irreversibile.")){
                    setCharacters(prev => prev.filter(c => c.id !== id));
                    if(selectedCharacterId === id) setSelectedCharacterId(null);
                }
            };
            const handleBackToSelector = () => { setSelectedCharacterId(null); };
            const selectedCharacter = characters.find(c => c.id === selectedCharacterId);

            return (
                <main>
                    {!selectedCharacter ? (
                        <CharacterSelector characters={characters} onSelect={handleSelectCharacter} onCreate={handleCreateCharacter} onDelete={handleDeleteCharacter} onFullGenerate={handleFullGenerateCharacter} />
                    ) : (
                        <CharacterSheet character={selectedCharacter} onUpdate={handleUpdateCharacter} onBack={handleBackToSelector} />
                    )}
                </main>
            );
        }
        
        const FullGeneratorModal = ({ isOpen, onClose, onGenerate, isLoading }) => {
            const [prompt, setPrompt] = useState('');
            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-stone-100 p-8 rounded-lg shadow-2xl w-full max-w-lg relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-stone-500 hover:text-stone-800 text-2xl">&times;</button>
                        <h2 className="text-2xl font-serif text-red-900 mb-4">Creazione Rapida con IA</h2>
                        <p className="text-stone-600 mb-6">Descrivi il concetto del tuo personaggio (es. "nano chierico burbero", "elfa maga ossessionata dai libri"). L'IA genererà una scheda completa di livello 1 pronta per giocare.</p>
                        <textarea value={prompt} onChange={(e) => setPrompt(e.target.value)} placeholder="Es: Mezz'orco barbaro dal cuore tenero..." className="w-full p-2 border border-stone-300 rounded-md mb-4" rows="3" />
                        <GeminiButton onClick={() => onGenerate(prompt)} isLoading={isLoading} className="w-full py-3 text-base">
                            {isLoading ? 'Generazione in corso...' : 'Crea il mio Eroe!'}
                        </GeminiButton>
                    </div>
                </div>
            );
        };

        const CharacterSelector = ({ characters, onSelect, onCreate, onDelete, onFullGenerate }) => {
            const [isGeneratorOpen, setIsGeneratorOpen] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);

            const handleGenerate = async (prompt) => {
                setIsGenerating(true);
                await onFullGenerate(prompt);
                setIsGenerating(false);
                setIsGeneratorOpen(false);
            };

            return (
                <>
                    <FullGeneratorModal isOpen={isGeneratorOpen} onClose={() => setIsGeneratorOpen(false)} onGenerate={handleGenerate} isLoading={isGenerating} />
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-2xl bg-white/60 border-4 border-stone-400/50 rounded-lg p-6 md:p-8 shadow-2xl backdrop-blur-md">
                            <h1 className="text-3xl md:text-4xl font-serif text-center text-red-900 mb-2">I Tuoi Eroi</h1>
                            <p className="text-center text-stone-600 mb-8">Scegli un personaggio, creane uno da zero, o usa l'IA per un'avventura istantanea.</p>
                            <div className="flex flex-col sm:flex-row gap-4 mb-8">
                                <ParchmentButton onClick={onCreate} className="w-full bg-red-800/80 hover:bg-red-700/80 text-white font-bold py-3 px-6 text-lg">
                                    + Crea Personaggio
                                </ParchmentButton>
                                <GeminiButton onClick={() => setIsGeneratorOpen(true)} isLoading={isGenerating} className="w-full py-3 text-base">
                                    Creazione Rapida IA
                                </GeminiButton>
                            </div>
                            <div className="space-y-4">
                                {characters.length > 0 ? (
                                    characters.map(char => (
                                        <div key={char.id} className="flex items-center justify-between bg-stone-50/80 p-4 rounded-lg border border-stone-300 shadow-sm">
                                            <div className="flex items-center space-x-4 overflow-hidden">
                                                {char.imageUrl ? <img src={char.imageUrl} alt={char.name} className="w-12 h-12 rounded-full object-cover flex-shrink-0"/> : <div className="w-12 h-12 rounded-full bg-stone-300 flex-shrink-0"/>}
                                                <div className="overflow-hidden">
                                                    <h2 className="font-bold text-lg text-stone-800 truncate">{char.name}</h2>
                                                    <p className="text-sm text-stone-600 truncate">{char.classLevel} | {char.race}</p>
                                                </div>
                                            </div>
                                            <div className="flex space-x-2 flex-shrink-0">
                                                <ParchmentButton onClick={() => onSelect(char.id)}>Carica</ParchmentButton>
                                                <button onClick={() => onDelete(char.id)} className="p-2 text-stone-500 hover:text-red-700 transition-colors" aria-label="Elimina personaggio">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                ) : ( <p className="text-center text-stone-500 italic py-8">Nessun personaggio salvato. È ora di iniziare un'avventura!</p> )}
                            </div>
                        </div>
                    </div>
                </>
            );
        };
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

    </script>
</body>
</html>
