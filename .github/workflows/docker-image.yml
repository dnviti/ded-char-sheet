name: Release and Docker Image CI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*' # Trigger on semantic versioning tags like v1.0.0

jobs:
  build_and_publish:
    name: Build Docker and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a GitHub Release
      packages: write # Required to publish packages to GHCR

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to the GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          # For branch pushes, use the branch name as the tag.
          type=ref,event=branch
          # For semver tags, use the version number as the tag.
          type=semver,pattern={{version}}
          # For semver tags, also add the 'latest' tag.
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          New release based on tag `${{ github.ref_name }}`.
          The Docker image has been published to `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}